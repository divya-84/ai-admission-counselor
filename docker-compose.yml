services:
  db:
    image: postgres:17-alpine
    container_name: ai-admission-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_admission_counselor
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-admission-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: 'postgresql://postgres:postgres@db:5432/ai_admission_counselor?schema=public'
      JWT_SECRET: 'super-secret-jwt-key-replace-in-production'
      JWT_REFRESH_SECRET: 'super-secret-refresh-key-replace-in-production'
      LOG_LEVEL: info
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ai-admission-frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  postgres_data:
