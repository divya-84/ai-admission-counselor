services:
  # Backend Service
  - type: web
    name: ai-admission-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free

    envVars:
      - key: PORT
        value: 5000

      - key: NODE_ENV
        value: production

      # IMPORTANT:
      # Set this manually in Render after the service is created.
      - key: DATABASE_URL
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: LOG_LEVEL
        value: info

      - key: OPENAI_API_KEY
        sync: false

  # Frontend Service
  - type: web
    name: ai-admission-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: .
    plan: free
