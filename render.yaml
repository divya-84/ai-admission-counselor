services:
  # 1. Backend Web Service
  - type: web
    name: ai-admission-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-admission-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: info
      - key: OPENAI_API_KEY
        sync: false # User will input this manually in Render dashboard

  # 2. Frontend Web Service (Nginx Container)
  - type: web
    name: ai-admission-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: .
    plan: free

databases:
  # 3. Managed PostgreSQL Database Instance
  - name: ai-admission-db
    plan: free
    postgresMajorVersion: 16
